# version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8n}
      - POSTGRES_DB=n8n
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - n8n-network
    restart: unless-stopped
    
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: >
      sh -c "redis-server 
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}"
    volumes:
     - redis-data:/data
    networks:
     - n8n-network

  # Python FastAPI Service
  python-api:
    build:
      context: ./python-api
      dockerfile: Dockerfile
    container_name: python-api
    volumes:
      - ./scripts:/app/scripts:ro
    ports:
      - ${PYTHON_API_PUBLISHED_PORT:-127.0.0.1:8000:8000}
    networks:
      - n8n-network
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Prometheus Metrics Server
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - ${PROMETHEUS_PUBLISHED_PORT:-127.0.0.1:9090:9090}
    networks:
      - monitoring
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:main-ubuntu
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - ${GRAFANA_PUBLISHED_PORT:-127.0.0.1:3000:3000}
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus

  # cAdvisor - Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - ${CADVISOR_PUBLISHED_PORT:-127.0.0.1:8080:8080}
    networks:
      - monitoring
    restart: unless-stopped

  # Node Exporter - Host Metrics
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
    ports:
      - ${NODE_EXPORTER_PUBLISHED_PORT:-127.0.0.1:9100:9100}
    networks:
      - monitoring
    restart: unless-stopped


  # n8n Workflow Automation
  n8n-main:
    image: n8nio/n8n:latest
    container_name: n8n-main
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-pass}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
      - N8N_HOST=${N8N_HOST:-n8n.dashboard.com}
      - WEBHOOK_URL=${WEBHOOK_URL:-https://n8n.dashboard.com}
      - EXECUTIONS_MODE=queue       # Controls whether executions run in the main process or a subprocess.
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=0     # You can isolate n8n by using a different DB number.
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-}   # Leave empty if Redis has no password
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-True}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-a2ac75ab0d0f6798b16a61da518ba1f3d75e205f7560c312257911e90c7476b5}
      # generated with "openssl rand -hex 32"
      # n8n-main and n8n-workers must have the SAME key
      - GENERIC_TIMEZONE=UTC
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
    ports:
      - ${N8N_PUBLISHED_PORT:-127.0.0.1:5678:5678}
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - n8n-network
    depends_on:
      - redis

  n8n-worker:
    image: n8nio/n8n:latest
    container_name: n8n-worker
    restart: unless-stopped
    command: ["worker", "--concurrency=4"]
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=0
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-a2ac75ab0d0f6798b16a61da518ba1f3d75e205f7560c312257911e90c7476b5}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
    networks:
      - n8n-network
    depends_on:
      - redis
      - n8n-main

volumes:
  prometheus_data:
  grafana_data:
  redis-data:
  n8n-data:
  postgres-data:

networks:
  n8n-network:
    driver: bridge
  monitoring:
    driver: bridge